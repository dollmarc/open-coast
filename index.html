<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Coast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #1e1e1e;
  --white: #f7f5f1;
  --ink: #2a2825;
  --ink-mid: #5a5650;
  --ink-light: #8a8580;
  --rule: 1px solid #d4cfc8;
  --rule-heavy: 3px solid #2a2825;
  --surface: #f7f5f1;
  --surface-alt: #eeebe5;
  --surface-closed: #f2f0ec;
  --accent: #3b6d80;
  --accent-light: #d4e8ee;
}

html { font-size: 16px; }

body {
  font-family: 'Barlow', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: var(--surface);
  color: var(--ink);
  min-height: 100vh;
}

/* ── MASTHEAD ── */
.masthead {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: stretch;
  border-bottom: var(--rule-heavy);
}

.masthead-left {
  padding: 32px 40px 28px;
  border-right: var(--rule);
  display: flex;
  flex-direction: column;
  gap: 0;
}

.masthead-eyebrow {
  font-family: 'Barlow', 'Helvetica Neue', Helvetica, sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: lowercase;
  color: var(--ink-mid);
  margin-bottom: 10px;
}

.masthead-title {
  font-family: 'Barlow', 'Helvetica Neue', Helvetica, sans-serif;
  font-size: clamp(32px, 4.5vw, 56px);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 0.9;
  text-transform: lowercase;
}

.masthead-title em {
  font-style: italic;
  font-weight: 300;
}

.masthead-right {
  padding: 28px 40px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  min-width: 200px;
}

.open-counter { text-align: right; }

.open-counter .num {
  font-family: 'Barlow', sans-serif;
  font-size: 72px;
  font-weight: 700;
  line-height: 1;
  display: block;
}

.open-counter .label {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: lowercase;
  font-weight: 500;
  display: block;
  margin-top: 4px;
  font-family: 'Barlow', sans-serif;
  color: var(--ink-mid);
}

.open-counter .sublabel {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-light);
  display: block;
  margin-top: 2px;
  font-family: 'Barlow', sans-serif;
}



/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  align-items: stretch;
  border-bottom: var(--rule);
}

.toolbar-section {
  display: flex;
  align-items: stretch;
  border-right: var(--rule);
}

.toolbar-section:last-child { border-right: none; margin-left: auto; }

.tb-label {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: lowercase;
  font-weight: 700;
  padding: 0 16px;
  display: flex;
  align-items: center;
  border-right: var(--rule);
  background: var(--surface-alt);
  color: var(--ink-mid);
  font-family: 'Barlow', sans-serif;
}

.tb-btn {
  background: transparent;
  border: none;
  border-right: var(--rule);
  padding: 12px 20px;
  font-family: 'Barlow', 'Helvetica Neue', Helvetica, sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: lowercase;
  cursor: pointer;
  color: var(--ink-light);
  transition: background .1s, color .1s;
  white-space: nowrap;
}

.tb-btn:last-child { border-right: none; }
.tb-btn:hover { background: var(--surface-alt); color: var(--ink); }
.tb-btn.active { background: var(--ink); color: var(--surface); }

.time-badge {
  display: flex;
  align-items: center;
  padding: 0 24px;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: lowercase;
  font-weight: 500;
  color: var(--ink-light);
  font-family: 'Barlow', sans-serif;
}

/* ── MAIN LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 1fr;
}

.layout.split {
  grid-template-columns: 420px 1fr;
}

/* ── LIST PANE ── */
.list-pane { border-right: var(--rule); }

.list-scroll {
  overflow-y: auto;
  max-height: calc(100vh - 190px);
  scrollbar-width: thin;
  scrollbar-color: #ccc transparent;
}

/* Section headers */
.list-section-head {
  display: grid;
  grid-template-columns: 48px 1fr;
  border-bottom: var(--rule);
  background: var(--ink);
  color: var(--surface);
  position: sticky;
  top: 0;
  z-index: 10;
}

.list-section-head .sh-num {
  font-family: 'Barlow', sans-serif;
  font-size: 20px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid #3e3b37;
  padding: 8px 0;
}

.list-section-head .sh-label {
  font-family: 'Barlow', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: lowercase;
  display: flex;
  align-items: center;
  padding: 0 16px;
}

.list-section-head.closed-head {
  background: var(--surface-alt);
  color: var(--ink-light);
}

.list-section-head.closed-head .sh-num { border-right: 1px solid #d4cfc8; }

/* Cards */
.card {
  display: grid;
  grid-template-columns: 48px 1fr;
  border-bottom: var(--rule);
  cursor: pointer;
  transition: background .08s;
}

.card:hover { background: var(--surface-alt); }
.card.active { background: var(--ink); color: var(--surface); }
.card.closed-card { opacity: 1; }
.card.closed-card .card-name { color: var(--ink-light); }
.card.closed-card .card-hours { color: var(--ink-light); opacity: 0.7; }
.card.closed-card .card-meta { color: #b5b0aa; }
.card.closed-card .card-index { color: #c5c0ba; }
.card.closed-card .card-link { color: var(--ink-light); border-color: #c5c0ba; }

.card.closed-card:hover { background: var(--surface-alt); }
.card.closed-card:hover .card-name { color: var(--ink); }
.card.closed-card:hover .card-hours { color: var(--ink-mid); opacity: 1; }
.card.closed-card:hover .card-meta { color: var(--ink-light); }
.card.closed-card:hover .card-index { color: var(--ink-light); }
.card.closed-card:hover .card-link { color: var(--ink); border-color: var(--ink-light); }

.card-index {
  font-family: 'Barlow', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--ink-light);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 18px;
  border-right: var(--rule);
}

.card.active .card-index { color: var(--ink-light); border-right-color: #3e3b37; }

.card-body { padding: 16px 20px 14px; }

.card-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 4px;
}

.card-name {
  font-family: 'Barlow', sans-serif;
  font-size: 16px;
  font-weight: 700;
  text-transform: lowercase;
  letter-spacing: 0.04em;
  line-height: 1.2;
}

.status-mark {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: lowercase;
  font-family: 'Barlow', sans-serif;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 5px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}

.status-mark.open .status-dot { background: var(--accent); }
.status-mark.open { color: var(--ink); }
.card.active .status-mark.open .status-dot { background: var(--accent-light); }

.status-mark.closed .status-dot { border: 1px solid var(--ink-light); background: transparent; }
.status-mark.closed { color: var(--ink-light); }

.card-hours {
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.04em;
  color: var(--ink-mid);
  margin-bottom: 8px;
  font-style: italic;
}

.card.active .card-hours { color: #a09b95; }

.card-meta {
  font-size: 10px;
  letter-spacing: 0.05em;
  color: var(--ink-light);
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  font-family: 'Barlow', sans-serif;
}

.card-links {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.card-link {
  font-size: 9px;
  font-family: 'Barlow', sans-serif;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: lowercase;
  color: var(--ink);
  text-decoration: none;
  border: 1px solid var(--ink-light);
  padding: 3px 8px;
  transition: background .1s, color .1s, border-color .1s;
  display: inline-block;
}

.card-link:hover { background: var(--ink); color: var(--surface); border-color: var(--ink); }
.card.active .card-link { border-color: #6e6a63; color: var(--surface); }
.card.active .card-link:hover { background: var(--surface); color: var(--ink); border-color: var(--surface); }

/* ── MAP PANE ── */
.map-pane {
  position: sticky;
  top: 0;
  height: calc(100vh - 140px);
  overflow: hidden;
}

#map { width: 100%; height: 100%; }

/* Leaflet Swiss overrides */
.leaflet-container { background: #ebe8e2; font-family: 'Barlow', sans-serif; }

.leaflet-popup-content-wrapper {
  background: var(--surface);
  color: var(--ink);
  border: 2px solid var(--ink);
  border-radius: 0;
  box-shadow: 4px 4px 0 rgba(42,40,37,0.15);
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
}

.leaflet-popup-tip-container { display: none; }
.leaflet-popup-content { margin: 12px 16px; line-height: 1.7; }
.leaflet-popup-content strong {
  font-size: 14px;
  font-weight: 700;
  text-transform: lowercase;
  letter-spacing: 0.05em;
  display: block;
  margin-bottom: 4px;
}

.leaflet-control-zoom { border: var(--rule) !important; border-radius: 0 !important; }
.leaflet-control-zoom a { border-radius: 0 !important; font-family: 'Barlow Condensed', sans-serif !important; font-weight: 700 !important; color: var(--ink) !important; border-bottom: var(--rule) !important; background: var(--surface) !important; }

/* ── EMPTY STATE ── */
.empty-state {
  padding: 64px 40px;
  font-family: 'Barlow', sans-serif;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: lowercase;
  color: var(--ink-light);
  border-bottom: var(--rule);
}

/* ── FOOTER ── */
footer {
  border-top: var(--rule-heavy);
  display: grid;
  grid-template-columns: 48px 1fr auto;
}

footer .f-mark {
  border-right: var(--rule);
  display: flex;
  align-items: center;
  justify-content: center;
}

footer .f-mark::after {
  content: '';
  width: 16px;
  height: 16px;
  background: var(--black);
}

footer .f-text {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: lowercase;
  font-weight: 500;
  color: var(--ink-light);
  font-family: 'Barlow', sans-serif;
  padding: 12px 20px;
  display: flex;
  align-items: center;
}

footer .f-date {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: lowercase;
  color: var(--ink-light);
  font-family: 'Barlow', sans-serif;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  border-left: var(--rule);
}

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .layout.split { grid-template-columns: 1fr; }
  .map-pane { position: static; height: 320px; }
  .masthead-title { font-size: 48px; }
  .masthead-right { display: none; }
  .list-scroll { max-height: none; }
}
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-left">
    <span class="masthead-eyebrow">North Oregon Coast — Dining Guide</span>
    <h1 class="masthead-title">open <em>coast</em></h1>
  </div>
  <div class="masthead-right">
    <div class="open-counter">
      <span class="num" id="openNum">—</span>
      <span class="label">Open Now</span>
      <span class="sublabel">of <span id="totalNum">—</span> places</span>
    </div>
  </div>
</header>

<nav class="toolbar" role="navigation" aria-label="Filters and view controls">
  <div class="toolbar-section">
    <span class="tb-label">View</span>
    <button class="tb-btn" onclick="setView('list')">List</button>
    <button class="tb-btn active" onclick="setView('split')">Split</button>
    <button class="tb-btn" onclick="setView('map')">Map</button>
  </div>
  <div class="toolbar-section">
    <span class="tb-label">Location</span>
    <button class="tb-btn active" onclick="setLocation('all')">All</button>
    <button class="tb-btn" onclick="setLocation('astoria')">Astoria</button>
    <button class="tb-btn" onclick="setLocation('warrenton')">Warrenton</button>
    <button class="tb-btn" onclick="setLocation('gearhart')">Gearhart</button>
    <button class="tb-btn" onclick="setLocation('seaside')">Seaside</button>
    <button class="tb-btn" onclick="setLocation('cannon-beach')">Cannon Beach</button>
    <button class="tb-btn" onclick="setLocation('nehalem')">Nehalem</button>
    <button class="tb-btn" onclick="setLocation('manzanita')">Manzanita</button>
  </div>
  <div class="toolbar-section">
    <span class="tb-label">Filter</span>
    <button class="tb-btn active" onclick="setFilter('all')">All</button>
    <button class="tb-btn" onclick="setFilter('open')">Open Now</button>
    <button class="tb-btn" onclick="setFilter('restaurant')">Restaurant</button>
    <button class="tb-btn" onclick="setFilter('cafe')">Café</button>
  </div>
  <div class="toolbar-section">
    <span class="time-badge" id="timeBadge">—</span>
  </div>
</nav>

<main class="layout" id="layout">
  <div class="list-pane" id="listPane">
    <div class="list-scroll" id="listScroll"></div>
  </div>
  <div class="map-pane" id="mapPane" style="display:none">
    <div id="map"></div>
  </div>
</main>

<footer>
  <div class="f-mark" aria-hidden="true"></div>
  <span class="f-text">Hours sourced from Google Places · Verify before visiting</span>
  <span class="f-date" id="footerDate">—</span>
</footer>

const ptNow = new Date(new Date().toLocaleString("en-US",{timeZone:"America/Los_Angeles"}));
const dayIdx = ptNow.getDay();
const curMin = ptNow.getHours()*60+ptNow.getMinutes();

function isOpen(p){ const r=p.raw[dayIdx]; return r?curMin>=r[0]&&curMin<r[1]:false; }
function todayHours(p){ return p.hours[dayIdx]||"Closed"; }
function hoursLine(p){
  const h=todayHours(p);
  if(h==="Closed") return "Closed today";
  const parts=h.split("–");
  return isOpen(p)?`Open until ${parts[1]?parts[1].trim():h}`:`Opens ${parts[0]?parts[0].trim():h}`;
}

let viewMode="split", filterMode="all", locationFilter="all", activeIdx=null, map=null, markers=[];

const LOCATION_META = {
  "cannon-beach": { label:"Cannon Beach", center:[45.893,-123.962], zoom:14 },
  "seaside":       { label:"Seaside",       center:[45.9936,-123.9228], zoom:14 },
  "gearhart":      { label:"Gearhart",      center:[46.0272,-123.9180], zoom:14 },
  "warrenton":     { label:"Warrenton",     center:[46.1648,-123.9234], zoom:13 },
  "astoria":       { label:"Astoria",       center:[46.1877,-123.8320], zoom:14 },
  "manzanita":     { label:"Manzanita",     center:[45.7179,-123.9386], zoom:15 },
  "nehalem":       { label:"Nehalem",       center:[45.7099,-123.8879], zoom:15 },
};

function setView(v){
  viewMode=v;
  document.querySelectorAll('.toolbar-section:first-child .tb-btn').forEach((b,i)=>{
    b.classList.toggle("active",["list","split","map"][i]===v);
  });
  render();
}

function setLocation(loc){
  locationFilter=loc;
  document.querySelectorAll('.toolbar-section:nth-child(2) .tb-btn').forEach(b=>{
    const key=b.getAttribute("onclick").match(/setLocation\('(.+?)'\)/)?.[1];
    b.classList.toggle("active",key===loc);
  });
  if(map && loc!=="all"){
    const m=LOCATION_META[loc];
    if(m) map.setView(m.center,m.zoom);
  } else if(map && loc==="all"){
    map.setView([45.993,-123.910],10);
  }
  render();
}

function setFilter(f){
  filterMode=f;
  const labels={all:"All",open:"Open Now",restaurant:"Restaurant",cafe:"Café"};
  document.querySelectorAll('.toolbar-section:nth-child(3) .tb-btn').forEach(b=>{
    b.classList.toggle("active",b.textContent.trim()===labels[f]);
  });
  render();
}

function getFiltered(){
  return PLACES.filter(p=>{
    if(locationFilter!=="all" && p.location!==locationFilter) return false;
    if(filterMode==="open") return isOpen(p);
    if(filterMode==="restaurant") return p.type==="restaurant";
    if(filterMode==="cafe") return p.type==="cafe";
    return true;
  }).sort((a,b)=>{
    const ao=isOpen(a),bo=isOpen(b);
    if(ao&&!bo) return -1; if(!ao&&bo) return 1;
    return b.rating-a.rating;
  });
}

function render(){
  const layout=document.getElementById("layout");
  const listPane=document.getElementById("listPane");
  const mapPane=document.getElementById("mapPane");
  const scroll=document.getElementById("listScroll");

  layout.className="layout"+(viewMode==="split"?" split":"");
  listPane.style.display=viewMode==="map"?"none":"block";
  mapPane.style.display=viewMode==="list"?"none":"block";
  if(viewMode!=="list") initMap();

  const list=getFiltered();
  scroll.innerHTML="";

  const openItems=list.filter(p=>isOpen(p));
  const closedItems=list.filter(p=>!isOpen(p));

  function renderSection(items, isOpenSection){
    if(!items.length) return;
    const head=document.createElement("div");
    head.className="list-section-head"+(isOpenSection?"":" closed-head");
    head.innerHTML=`<span class="sh-num">${items.length}</span><span class="sh-label">${isOpenSection?"Open Now":"Closed Today"}</span>`;
    scroll.appendChild(head);

    items.forEach(p=>{
      const gIdx=PLACES.indexOf(p);
      const open=isOpen(p);
      const card=document.createElement("div");
      card.className="card"+(open?"":" closed-card")+(activeIdx===gIdx?" active":"");

      const links=[];
      if(p.website) links.push(`<a class="card-link" href="${p.website}" target="_blank" rel="noopener">Website</a>`);
      if(p.menu) links.push(`<a class="card-link" href="${p.menu}" target="_blank" rel="noopener">Menu</a>`);
      links.push(`<a class="card-link" href="https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}" target="_blank" rel="noopener">Map</a>`);
      if(p.phone) links.push(`<a class="card-link" href="tel:${p.phone}">Call</a>`);

      card.innerHTML=`
        <span class="card-index">${String(gIdx+1).padStart(2,"0")}</span>
        <div class="card-body">
          <div class="card-top">
            <span class="card-name">${p.name}</span>
            <span class="status-mark ${open?"open":"closed"}"><span class="status-dot"></span>${open?"Open":"Closed"}</span>
          </div>
          <div class="card-hours">${hoursLine(p)}</div>
          <div class="card-meta">
            <span>${p.rating} ★ &nbsp;${p.reviews.toLocaleString()} reviews</span>
            <span>·</span>
            <span>${p.type.toUpperCase()}</span>
            <span>·</span>
            <span>${(LOCATION_META[p.location]||{label:p.location}).label}</span>
          </div>
          <div class="card-links">${links.join("")}</div>
        </div>
      `;
      card.onclick=()=>{ activeIdx=gIdx; highlightMarker(p); render(); };
      scroll.appendChild(card);
    });
  }

  if(filterMode==="open"){
    renderSection(list,true);
  } else {
    renderSection(openItems,true);
    renderSection(closedItems,false);
  }

  if(!list.length){
    const e=document.createElement("div");
    e.className="empty-state";
    e.textContent="No results";
    scroll.appendChild(e);
  }

  const scopedPlaces = locationFilter==="all" ? PLACES : PLACES.filter(p=>p.location===locationFilter);
  const openCount=scopedPlaces.filter(isOpen).length;
  document.getElementById("openNum").textContent=openCount;
  document.getElementById("totalNum").textContent=scopedPlaces.length;

  const timeStr=ptNow.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZone:"America/Los_Angeles"});
  document.getElementById("timeBadge").textContent=timeStr+" PT";
  document.getElementById("footerDate").textContent=ptNow.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

  markers.forEach((m,i)=>m.setOpacity(list.includes(PLACES[i])?1:0.2));
}

function initMap(){
  if(map) return;
  map=L.map("map",{center:[45.993,-123.910],zoom:10});
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',
    subdomains:"abcd",maxZoom:19
  }).addTo(map);

  PLACES.forEach((p,i)=>{
    const open=isOpen(p);
      const size=open?8:6;
      const icon=L.divIcon({
        className:"",
        html:`<div style="width:${size}px;height:${size}px;background:${open?"#3b6d80":"#f7f5f1"};border:1.5px solid ${open?"#3b6d80":"#b0aba4"};border-radius:50%;"></div>`,
        iconSize:[size,size],iconAnchor:[size/2,size/2]
      });
    const marker=L.marker([p.lat,p.lng],{icon}).addTo(map);
    marker.bindPopup(`<strong>${p.name}</strong>${open?"<br>Open now":"<br>Closed"}<br><span style="color:#555;font-style:italic;">${todayHours(p)}</span>`);
    marker.on("click",()=>{ activeIdx=i; render(); });
    markers.push(marker);
  });
}

function highlightMarker(p){
  if(!map) return;
  const idx=PLACES.indexOf(p);
  if(markers[idx]){ map.setView([p.lat,p.lng],15); markers[idx].openPopup(); }
}

function detectAndInit() {
  if (!navigator.geolocation) { render(); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    let closest = null, minDist = Infinity;
    for (const [key, meta] of Object.entries(LOCATION_META)) {
      const d = Math.hypot(lat - meta.center[0], lng - meta.center[1]);
      if (d < minDist) { minDist = d; closest = key; }
    }
    if (closest && minDist < 0.15) {
      setLocation(closest);
    } else {
      render();
    }
  }, () => render());
}

detectAndInit();
</script>
